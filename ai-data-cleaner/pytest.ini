[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --disable-warnings
    --cov=server
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests